			"start": {"fields": [{"field":"authors", "comparator":"sizeMatch", "weight":1.0, "ignoreMissing":"true", "params":{}}, {"field":"title", "comparator":"titleVersionMatch", "weight":1.0, "ignoreMissing":"false", "params":{}}], "threshold": 1.0, "aggregation": "MIN", "positive":"layer2", "negative":"NO_MATCH", "undefined":"layer2", "ignoreMissing": "false"},
			"layer2": {"fields": [{"field":"title", "comparator":"jaroWinkler", "weight":0.5, "ignoreMissing":"false", "params":{}}, {"field":"authors", "comparator":"sortedLevel2JaroWinkler", "weight":0.5, "ignoreMissing":"true", "params":{}}], "threshold":0.99, "aggregation": "WEIGHTED_MEAN", "positive":"MATCH", "negative":"NO_MATCH", "undefined": "NO_MATCH", "ignoreMissing": "true"}
		},
		"model" : [	
			{ "name" : "title", "type" : "String", "path" : "result/metadata/title[qualifier#classid = {main title}]/value" },
			{ "name" : "authors", "type" : "String", "path" : "result/metadata/author/fullname" }
		],
		"blacklists" : { } 		
	}

