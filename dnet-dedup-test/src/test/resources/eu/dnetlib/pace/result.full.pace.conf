{ 
	"wf" : { 
        "threshold" : "0.99", 
        "dedupRun" : "001",
        "entityType" : "result", 
        "orderField" : "title", 
        "queueMaxSize" : "2000",
        "groupMaxSize" : "10",
        "slidingWindowSize" : "200",
        "rootBuilder" : [ "result" ],
        "includeChildren" : "true" 
    },
	"pace" : {		
		"clustering" : [
			{ "name" : "acronyms", "fields" : [ "title" ], "params" : { "max" : "1", "minLen" : "2", "maxLen" : "4"} },
			{ "name" : "ngrampairs", "fields" : [ "title" ], "params" : { "max" : "1", "ngramLen" : "3"} },
			{ "name" : "suffixprefix", "fields" : [ "title" ], "params" : { "max" : "1", "len" : "3" } } 
		],
		"decisionTree" : {
			"start": {"fields": [{"field":"dateofacceptance", "comparator":"yearMatch", "weight":1.0, "ignoreMissing":"true", "params":{}}, {"field":"title", "comparator":"titleVersionMatch", "weight":1.0, "ignoreMissing":"false", "params":{}}, {"field":"authors", "comparator":"sizeMatch", "weight":1.0, "ignoreMissing":"false", "params":{}},{"field":"pid", "comparator":"pidMatch", "weight":1.0, "ignoreMissing":"true", "params":{}} ], "threshold": 1.0, "aggregation": "MIN", "positive":"layer2", "negative":"NO_MATCH", "undefined":"layer2", "ignoreMissing": "false"},
			"layer2": {"fields": [{"field":"title", "comparator":"jaroWinkler", "weight":0.5, "ignoreMissing":"false", "params":{}}], "threshold":0.99, "aggregation": "WEIGHTED_MEAN", "positive":"MATCH", "negative":"NO_MATCH", "undefined": "NO_MATCH", "ignoreMissing": "false"}
		},
		"model" : [
			{ "name" : "pid", "type" : "JSON", "path" : "pid", "overrideMatch" : "true" },
			{ "name" : "title", "type" : "String", "path" : "result/metadata/title[qualifier#classid = {main title}]/value" },
			{ "name" : "dateofacceptance", "type" : "String", "path" : "result/metadata/dateofacceptance/value" } ,
			{ "name" : "authors", "type" : "String", "path" : "result/metadata/author/fullname" }
		],
		"blacklists" : {
			"title" : [
				"^(Corpus Oral Dialectal \\(COD\\)\\.).*$",
				"^(Kiri Karl Morgensternile).*$",
				"^(\\[Eksliibris Aleksandr).*\\]$",
				"^(\\[Eksliibris Aleksandr).*$",
				"^(Eksliibris Aleksandr).*$",
				"^(Kiri A\\. de Vignolles).*$",
				"^(2 kirja Karl Morgensternile).*$",
				"^(Pirita kloostri idaosa arheoloogilised).*$",
				"^(Kiri tundmatule).*$",
				"^(Kiri Jenaer Allgemeine Literaturzeitung toimetusele).*$",
				"^(Eksliibris Nikolai Birukovile).*$",
				"^(Eksliibris Nikolai Issakovile).*$",
				"^(WHP Cruise Summary Information of section).*$",
				"^(Measurement of the top quark\\-pair production cross section with ATLAS in pp collisions at).*$",
				"^(Measurement of the spin\\-dependent structure function).*"
			] } 		
	}

}
