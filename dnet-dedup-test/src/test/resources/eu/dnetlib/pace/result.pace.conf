{ 
	"wf" : { 
        "threshold" : "0.99", 
        "dedupRun" : "001",
        "entityType" : "result", 
        "orderField" : "title", 
        "queueMaxSize" : "2000",
        "groupMaxSize" : "10",
        "slidingWindowSize" : "200",
        "rootBuilder" : [ "result" ],
        "includeChildren" : "true" 
    },
	"pace" : {
		"decisionTree" : {
			"start": {"fields": [{"field":"pid", "comparator":"pidMatch", "weight":1.0, "ignoreMissing":"true", "params":{}}], "threshold": 1.0, "aggregation": "SUM", "positive":"MATCH", "negative":"layer2", "undefined":"layer2", "ignoreMissing": "true"},
			"layer2": {"fields": [{"field":"dateofacceptance", "comparator":"yearMatch", "weight":1.0, "ignoreMissing":"true", "params":{}}, {"field":"title", "comparator":"titleVersionMatch", "weight":1.0, "ignoreMissing":"false", "params":{}}], "threshold":1.0, "aggregation": "MIN", "positive":"layer3", "negative":"NO_MATCH", "undefined": "layer3", "ignoreMissing": "true"},
			"layer3": {"fields": [{"field":"title", "comparator":"level2Levenshtein", "weight":1.0, "ignoreMissing": "false", "params":{}}], "threshold":0.99, "aggregation":"SUM", "positive":"MATCH", "negative":"NO_MATCH", "undefined":"NO_MATCH", "ignoreMissing":"false"}
		},
		"model" : [
			{ "name" : "pid", "type" : "JSON", "path" : "pid", "overrideMatch" : "true" },
			{ "name" : "title", "type" : "String", "path" : "result/metadata/title[qualifier#classid = {main title}]/value" },
			{ "name" : "dateofacceptance", "type" : "String", "path" : "result/metadata/dateofacceptance/value" }
		],
		"blacklists" : { } 		
	}

}
